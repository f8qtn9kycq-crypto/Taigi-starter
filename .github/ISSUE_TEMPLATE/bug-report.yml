name: Bug report
description: Report a reproducible technical problem
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open…\n2. Tap…\n3. See…"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual result
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Device and browser
      placeholder: iPhone 15, iOS 19, Safari
    validations:
      required: true
